<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資訊列表 - 臺灣臺島地方檢察署</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header { background-color: var(--primary-dark); color: white; padding: 40px 0; margin-bottom: 40px; }
        .page-header h1 { font-size: 2rem; }
        .list-container { max-width: 1000px; margin: 0 auto 60px; background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 40px; }
        .filter-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 25px; }
        .filter-btn { background-color: #924E19; color: white; border: none; padding: 10px 20px; font-size: 1rem; cursor: pointer; border-radius: 3px; transition: background-color 0.2s; }
        .filter-btn:hover, .filter-btn.active { background-color: #6C3810; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { border: 1px solid #eaeaea; padding: 15px; text-align: left; }
        .data-table th { font-weight: 600; color: #333; }
        .data-table a { color: var(--text-main); text-decoration: none; transition: color 0.2s; }
        .data-table a:hover { color: var(--primary-color); }
        .seq-col { width: 80px; text-align: center !important; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="nav-container container">
            <a href="index.html" class="logo">
                <div class="logo-img-placeholder"><i class="fa-solid fa-scale-balanced"></i></div>
                <div class="logo-text">
                    <h1>臺灣臺島地方檢察署</h1>
                </div>
            </a>
            <div class="search-box">
                <input type="text" placeholder="全站搜尋..." aria-label="全站搜尋">
                <button aria-label="搜尋"><i class="fa-solid fa-search"></i></button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <div class="page-header">
            <div class="container">
                <h1 id="pageTitle">資訊列表</h1>
            </div>
        </div>

        <div class="container">
            <div class="list-container" id="listContent">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const listType = params.get('type') || 'all';
            
            const titles = {
                'news': '新聞稿及最新消息',
                'board': '電子公布欄',
                'notice': '公示送達',
                'auction': '查扣物拍賣專區',
                'downloads': '書狀例稿下載',
                'all': '所有公告'
            };
            
            document.getElementById('pageTitle').textContent = titles[listType] || '資訊列表';
            document.title = (titles[listType] || '資訊列表') + ' - 臺灣臺島地方檢察署';

            const container = document.getElementById('listContent');
            
            let html = '';
            // Add filter tabs only for notice type
            if (listType === 'notice') {
                html += `
                    <div class="filter-tabs">
                        <button class="filter-btn active">全部</button>
                        <button class="filter-btn">書類</button>
                        <button class="filter-btn">傳票命令</button>
                        <button class="filter-btn">發還保證金</button>
                        <button class="filter-btn">扣押物（贓證物）拍賣或發還</button>
                        <button class="filter-btn">其他</button>
                    </div>
                `;
            }
            
            html += `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="seq-col">序號</th>
                            <th>標題</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let seq = 1;
            if (listType === 'notice' || listType === 'all') {
                html += `
                        <tr>
                            <td class="seq-col">${seq++}</td>
                            <td><a href="summons_11505001.pdf" target="_blank" title="下載 PDF 檔案"><i class="fa-solid fa-file-pdf" style="color: #d32f2f; margin-right: 5px;"></i>公示送達本署115年度他字第11505001號傳票乙件</a></td>
                        </tr>
                `;
            }

            if (listType === 'downloads') {
                const docList = [
                    '刑事聲請狀', '刑事告訴狀', '聲請撤回告訴狀', '聲請變更送達處所狀', '聲請變更期日應訊狀',
                    '聲請查復案件進行情形狀', '告訴人聲請再議', '被告聲請再議', '聲請撤回再議狀', '聲請檢察官提起上訴狀',
                    '緩起訴處分執行完畢證明書聲請表', '請求增(補)發書類聲請表', '聲請送達書類狀', '請求核發結案證明書聲請表', '請求補發相驗屍體證明書聲請表',
                    '聲請移转管轄狀', '請求囑託執行聲請表', '請求准予易科罰金聲請狀', '請求准予分期繳納罰金聲請表', '請求准就殘刑繳納罰金聲請表',
                    '請求發給執行完畢證明書聲請表', '請求發還刑事保證金聲請表', '委任書(領取保證金)', '請求發還證物扣押物聲請表', '委任書(領取證物扣押物)',
                    '請求更定應執行刑聲請表', '請求延期執行觀察勒戒聲請表', '請求停止/延期執行聲請表', '聲請傳喚證人/鑑定人狀', '請求解除限制出境聲請表',
                    '聲請撤銷通緝狀', '委任狀(被告)', '刑事答辯狀', '和解書', '聲請案移法院併自訴案審理狀',
                    '請求發監執行聲請表', '檔案應用申請書', '平民法律扶助申請書', '委任狀(告訴人)', '刑事陳報狀'
                ];
                
                docList.forEach(doc => {
                    html += `
                        <tr>
                            <td class="seq-col">${seq++}</td>
                            <td><a href="https://www.tcc.moj.gov.tw/295804/295875/994742/995210/" target="_blank"><i class="fa-solid fa-file-word" style="color: #2b579a; margin-right: 5px;"></i>${doc} - 例稿下載</a></td>
                        </tr>
                    `;
                });
            } else {
                for(let i=1; i<=10; i++) {
                    let title = `【${titles[listType]}】第 ${i} 號公告事項`;
                    if(listType === 'auction') title = `113年度第 ${i} 次查扣物（汽機車、黃金）變價拍賣公告`;
                    
                    html += `
                            <tr>
                                <td class="seq-col">${seq++}</td>
                                <td><a href="content.html?page=detail">${title}</a></td>
                            </tr>
                    `;
                }
            }
            
            html += `
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        });
    </script>
</body>
</html>
